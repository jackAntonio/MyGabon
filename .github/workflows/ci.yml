name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --no-fatal-infos : 18 lints "info" préexistants (BuildContext async,
      # API dépréciées) n'empêchent pas la CI de passer ; les vraies erreurs/
      # warnings restent bloquants. À durcir une fois ces infos nettoyés.
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
