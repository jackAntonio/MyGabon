name: mygabon

description: A super-app for Gabonese users to find services, post announcements, and buy/sell locally.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State Management
  # ⚠️ Restés en v2 volontairement : flutter_riverpod/riverpod_annotation ne
  # sont importés nulle part dans lib/ (l'app utilise exclusivement
  # `provider` ci-dessous) et riverpod ^3.0.0 entre en conflit de résolution
  # avec hive_generator ^2.0.0 (cf. erreur `flutter pub get` du 2026-06-25 :
  # riverpod 3.x exige test ^1.0.0, incompatible avec analyzer fixé par
  # hive_generator + flutter_test du SDK). À bumper seulement si ce package
  # devient réellement utilisé, en migrant aussi hive_generator à ce moment.
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  provider: ^6.0.0

  # Network & Connectivity
  connectivity_plus: ^7.0.0

  # Local Storage & Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.2.3

  # Data Serialization
  json_annotation: ^4.8.0

  # Typography & Design
  google_fonts: ^8.0.0
  flutter_svg: ^2.0.0

  # Animations & UI
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0

  # Routing
  go_router: ^17.0.0

  # Security & Encryption
  crypto: ^3.0.3
  uuid: ^4.0.0
  flutter_secure_storage: ^10.0.0

  # Internationalization & Formatting
  intl: ^0.20.2

  # Backend - Supabase
  flutter_dotenv: ^6.0.0
  http: ^1.1.0
  supabase_flutter: ^2.5.0
  supabase: ^2.1.0

  # Payments - Apple Pay & Google Pay
  pay: ^3.3.0

  # Image handling & upload
  image_picker: ^1.0.0
  image_cropper: ^12.0.0

  # Notifications push (OneSignal — pas Firebase, cf.
  # SUPABASE_VS_FIREBASE_DECISION.md : projet 100% Supabase, OneSignal évite
  # de réintroduire le SDK Firebase juste pour le push)
  onesignal_flutter: ^5.2.0

  # Firebase dependencies (commented for web build)
  # firebase_core: ^2.0.0
  # cloud_firestore: ^4.0.0
  # firebase_auth: ^4.0.0
  # firebase_messaging: ^14.0.0
  # geolocator: ^9.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
